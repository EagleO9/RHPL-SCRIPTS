<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ❗ CSS SAME – NOT REMOVED -->
  <style>
    :root{--bg:#f6f8fb;--card:#ffffff;--accent:#1976d2;--danger:#c62828;--box:#d1d9e6;}
    html,body{margin:0;background:var(--bg);font-family:Inter,Arial,sans-serif;}
    .wrapper{display:flex;justify-content:center;padding:20px;}
    .card{width:900px;max-width:95vw;background:#fff;padding:26px 30px;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.15);}
    .title{font-size:32px;font-weight:800;margin-bottom:20px;}
    .field{flex:1;min-width:220px;margin-bottom:20px;display:flex;flex-direction:column;}
    .lbl{font-weight:700;margin-bottom:6px;}
    .boxed{background:white;border-radius:10px;border:1px solid var(--box);}
    .form-control{width:100%;padding:12px 14px;font-size:15px;border:none;outline:none;background:transparent;}
    .items{display:flex;flex-direction:column;gap:20px;margin-top:20px;}
    .itemRow{display:flex;flex-wrap:wrap;gap:20px;padding:20px;background:white;border-radius:12px;border:1px solid var(--box);}
    .btn{padding:12px 20px;border:none;font-weight:700;border-radius:10px;cursor:pointer;font-size:15px;}
    .removeBtn{background:var(--danger);color:white;height:45px;align-self:end;}
    .addBtn{background:var(--accent);color:white;width:240px;margin-top:10px;}
    .submitBtn{background:black;color:white;}
    .clearBtn{background:white;border:1px solid #999;}
    .submit-row{margin-top:20px;display:flex;gap:20px;}
    .loading-spinner{border:4px solid #eee;border-top:4px solid #000;border-radius:50%;width:22px;height:22px;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
</head>

<body>
<div class="wrapper">
<div class="card">

<h1 class="title">Printing Form</h1>

<form onsubmit="return false;">

  <!-- DATE -->
  <div class="field">
    <label class="lbl">Entry Date</label>
    <div class="boxed">
      <input type="date" id="dateInput" class="form-control">
    </div>
  </div>

  <!-- Briquette -->
  <div class="field">
    <label class="lbl">Total Briquette Use (kg)</label>
    <div class="boxed">
      <input type="number" step="0.01" min="0" id="briquetteInput" class="form-control">
    </div>
  </div>

  <!-- SINGLE WASTAGE -->
  <div class="field">
    <label class="lbl">Total Wastage (kg)</label>
    <div class="boxed">
      <input type="number" step="0.01" min="0" id="totalWastageInput" class="form-control">
    </div>
  </div>

  <!-- Shift -->
  <div class="field">
    <label class="lbl">Shift</label>
    <div class="boxed">
      <select id="shiftInput" class="form-control">
        <option value="">Select Shift</option>
        <option value="Day">Day</option>
        <option value="Night">Night</option>
      </select>
    </div>
  </div>

  <!-- ITEMS -->
  <div id="itemsWrapper" class="items">
    <div class="itemRow">
      <div class="field">
        <label class="lbl">Item</label>
        <div class="boxed">
          <input type="text" class="form-control itemInput">
        </div>
      </div>

      <div class="field">
        <label class="lbl">Rolls</label>
        <div class="boxed">
          <input type="number" min="0" class="form-control rollsInput">
        </div>
      </div>

      <div class="field">
        <label class="lbl">Weight (kg)</label>
        <div class="boxed">
          <input type="number" step="0.01" min="0" class="form-control weightInput">
        </div>
      </div>

      <button type="button" class="btn removeBtn" onclick="removeRow(this)">Remove</button>
    </div>
  </div>

  <button type="button" class="btn addBtn" onclick="addRow()">+ Add Item</button>

  <div class="submit-row">
    <button type="button" class="btn submitBtn" onclick="submitForm()">Submit</button>
    <button type="button" class="btn clearBtn" onclick="clearAll()">Clear All</button>
  </div>

</form>
</div>
</div>

<script>
/* ===============================
   ITEM FETCH + AUTOCOMPLETE
================================ */
var itemsList=[];

document.addEventListener("DOMContentLoaded",()=>{
  dateInput.value = new Date().toISOString().split("T")[0];

  google.script.run.withSuccessHandler(items=>{
    itemsList = items || [];
    initAutocomplete($(".itemInput"));
  }).getItems();
});

function initAutocomplete($elems){
  $elems.each(function(){
    try{$(this).autocomplete("destroy");}catch(e){}
    $(this).autocomplete({
      source: itemsList,
      minLength: 0
    }).on("focus",function(){
      $(this).autocomplete("search","");
    });
  });
}

/* ===============================
   ROW HANDLING
================================ */
function addRow(){
  let tpl=document.querySelector(".itemRow");
  let clone=tpl.cloneNode(true);
  clone.querySelectorAll("input").forEach(i=>i.value="");
  itemsWrapper.appendChild(clone);
  initAutocomplete($(clone).find(".itemInput"));
}

function removeRow(btn){
  let rows=document.querySelectorAll(".itemRow");
  if(rows.length<=1){
    rows[0].querySelectorAll("input").forEach(i=>i.value="");
  }else{
    btn.closest(".itemRow").remove();
  }
}

/* ===============================
   CLEAR
================================ */
function clearAll(){
  dateInput.value = new Date().toISOString().split("T")[0];
  briquetteInput.value="";
  totalWastageInput.value="";
  shiftInput.value="";
  itemsWrapper.innerHTML="";
  addRow();
}

/* ===============================
   🔒 LOCK / UNLOCK (ADDED – NOTHING REMOVED)
================================ */
function lockForm(){
  document.querySelectorAll("input,select,button")
    .forEach(el=>el.disabled=true);
  document.querySelector(".submitBtn").innerHTML =
    '<span class="loading-spinner"></span> Saving...';
}

function unlockForm(){
  document.querySelectorAll("input,select,button")
    .forEach(el=>el.disabled=false);
  document.querySelector(".submitBtn").innerHTML="Submit";
}

/* ===============================
   SUBMIT (FIXED)
================================ */
function submitForm(){

  let date=dateInput.value;
  let briq=briquetteInput.value.trim();
  let shift=shiftInput.value;
  let wastage=parseFloat(totalWastageInput.value)||0;

  if(!date){alert("Select date");return;}
  if(!briq){alert("Enter briquette");return;}
  if(!shift){alert("Select shift");return;}

  let rows=[];
  let hasValidRow=false;
  let error=false;

  document.querySelectorAll(".itemRow").forEach((r,i)=>{
    let item=r.querySelector(".itemInput").value.trim();
    let rolls=r.querySelector(".rollsInput").value.trim();
    let weight=r.querySelector(".weightInput").value.trim();

    if(!item && !rolls && !weight) return;

    if(!item || !rolls || !weight){
      alert(`Row ${i+1} incomplete`);
      error=true;
      return;
    }

    hasValidRow=true;
    rows.push({ item, rolls, weight, wastage });
  });

  if(error) return;
  if(!hasValidRow){
    alert("At least one complete item required");
    return;
  }

  /* ✅ ONE CLICK DISABLE */
  lockForm();

  google.script.run
    .withSuccessHandler(()=>{
      setTimeout(()=>{
        unlockForm();
        clearAll();
      },500);

      setTimeout(()=>{
        location.reload();
      },1200);
    })
    .withFailureHandler(err=>{
      unlockForm();
      alert("❌ Save failed: "+err.message);
    })
    .saveFormData(rows, parseFloat(briq), shift, date);
}
</script>

</body>
</html>
